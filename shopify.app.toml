# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e288c86e683de88bd511fcdf2e78040b"
name = "Smart Activity Tracker"
application_url = "https://smart-activity-tracker-production.up.railway.app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_users powers full staff-member attribution (name/email of who made a
# change) and is only grantable on Shopify Plus / Advanced stores.
# read_customers / read_orders require approved "Protected customer data access".
scopes = "read_products,read_inventory,read_fulfillments,read_draft_orders,read_discounts,read_price_rules,read_marketing_events,read_themes,read_locations,read_customers,read_orders,read_users"

[webhooks]
api_version = "2026-10"

  # --- App & shop lifecycle ---
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # --- Activity logs (non-protected data — works without special approval) ---
  [[webhooks.subscriptions]]
  uri = "/webhooks/activity"
  topics = [
    "shop/update",

    "products/create",
    "products/update",
    "products/delete",

    "collections/create",
    "collections/update",
    "collections/delete",

    "fulfillments/create",
    "fulfillments/update",

    "inventory_levels/connect",
    "inventory_levels/update",
    "inventory_levels/disconnect",
    "inventory_items/create",
    "inventory_items/update",
    "inventory_items/delete",

    "discounts/create",
    "discounts/update",
    "discounts/delete",

    "themes/create",
    "themes/update",
    "themes/delete",
    "themes/publish"
  ]

  # --- Protected customer data (orders, draft orders, refunds, customers) ---
  [[webhooks.subscriptions]]
  uri = "/webhooks/activity"
  topics = [
    "orders/create",
    "orders/updated",
    "orders/cancelled",
    "orders/fulfilled",
    "orders/paid",
    "orders/partially_fulfilled",
    "orders/edited",
    "orders/delete",

    "draft_orders/create",
    "draft_orders/update",
    "draft_orders/delete",

    "refunds/create",

    "customers/create",
    "customers/update",
    "customers/delete",
    "customers/enable",
    "customers/disable"
  ]

  # --- GDPR / compliance (mandatory) ---
  # These three are configured as privacy webhooks, not topic subscriptions.
  [webhooks.privacy_compliance]
  customer_data_request_url = "https://smart-activity-tracker-production.up.railway.app/webhooks/compliance"
  customer_deletion_url = "https://smart-activity-tracker-production.up.railway.app/webhooks/compliance"
  shop_deletion_url = "https://smart-activity-tracker-production.up.railway.app/webhooks/compliance"

[auth]
redirect_urls = [
  "https://smart-activity-tracker-production.up.railway.app/auth/callback",
  "https://smart-activity-tracker-production.up.railway.app/auth/shopify/callback",
  "https://smart-activity-tracker-production.up.railway.app/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
